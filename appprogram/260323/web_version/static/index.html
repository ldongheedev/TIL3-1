<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwritten Digit Recognizer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="container">
    <h1>Handwritten Digit Recognizer</h1>
    <p class="subtitle">Draw a digit (0 – 9) and click <strong>Recognize</strong></p>

    <div class="canvas-wrapper">
      <canvas id="drawCanvas" width="280" height="280"></canvas>
    </div>

    <!-- Result -->
    <div class="result" id="result">--</div>

    <!-- Confidence bars -->
    <div class="bars" id="bars">
      <!-- Generated by JS -->
    </div>

    <!-- 28x28 preview -->
    <div class="preview-row">
      <span class="preview-label">Model input (28×28)</span>
      <canvas id="previewCanvas" width="84" height="84"></canvas>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button id="btnRecognize">Recognize</button>
      <button id="btnClear" class="secondary">Clear</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
